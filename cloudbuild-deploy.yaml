# Cloud Build pipeline for HireAI - One-shot manual deploy
# Run with:
#   gcloud builds submit --config cloudbuild-deploy.yaml --project=hireai-396ff .

steps:
  # Step 1: Build the Docker image with VITE_ build args so Firebase is embedded
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--platform'
      - 'linux/amd64'
      - '-t'
      - 'asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai:$BUILD_ID'
      - '-t'
      - 'asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai:latest'
      # Firebase config — baked into frontend bundle at build time by Vite
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=AIzaSyA-az1hs8XPIcCYr1Dahf4tVW6133xVGxE'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=hireai-396ff.firebaseapp.com'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=hireai-396ff'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=hireai-396ff.firebasestorage.app'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=330630572915'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=1:330630572915:web:9af37f88e1ab32cf7df306'
      - '--build-arg'
      - 'VITE_FIREBASE_MEASUREMENT_ID=G-TBB1WTKTZE'
      - '--build-arg'
      - 'VITE_STRIPE_PUBLISHABLE_KEY='
      - '--build-arg'
      - 'VITE_ADMIN_EMAILS=malviya.pratyush26@gmail.com'
      - '.'
    timeout: '1200s'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai'

  # Step 3: Deploy to Cloud Run (asia-south2) with runtime server-side env vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hireai'
      - '--image=asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai:$BUILD_ID'
      - '--region=asia-south2'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production,GEMINI_API_KEY=AIzaSyDu6S3m8sFPl8-AmzWvm9CUOfeK42qKKVI,NVIDIA_API_KEY=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,SMTP_HOST=smtp.gmail.com,SMTP_PORT=465,SMTP_SECURE=true,SMTP_USER=malviya.pratyush26@gmail.com,SMTP_PASS=cwrtopqdphtkjjqc,SMTP_FROM_NAME=HireNow,SMTP_FROM_EMAIL=malviya.pratyush26@gmail.com,APP_URL=https://hireai-3yg7toyg2a-em.a.run.app'
      - '--project=hireai-396ff'

images:
  - 'asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai:$BUILD_ID'
  - 'asia-south2-docker.pkg.dev/hireai-396ff/hireai/hireai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
