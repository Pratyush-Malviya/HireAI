steps:
  # Build the production Docker image
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'meeting-bot'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/meeting-bot:latest'
      - '-f'
      - 'Dockerfile.production'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/meeting-bot:latest'

