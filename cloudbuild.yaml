# Cloud Build pipeline for HireAI
# Triggered automatically on push to main branch (configure trigger in GCP Console)
#
# Prerequisites:
#   1. Enable APIs: Cloud Build, Cloud Run, Artifact Registry
#   2. Grant Cloud Build service account the Cloud Run Admin & Service Account User roles
#   3. Create Artifact Registry repo:
#      gcloud artifacts repositories create hireai \
#        --repository-format=docker --location=$_REGION

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai:latest'
      - '.'
    timeout: '1200s'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hireai'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=NODE_ENV=production'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/hireai/hireai:latest'

substitutions:
  _REGION: us-central1   # Override this in the Cloud Build trigger settings

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
